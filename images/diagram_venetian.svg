<svg xmlns="http://www.w3.org/2000/svg" viewBox="-80 0 680 510" width="680" height="510" font-family="sans-serif">
  <!-- Background -->
  <rect x="-80" width="680" height="510" fill="white"/>

  <!-- Title -->
  <text x="260" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#222">Venetian Blind (Dual-Axis) — Side Elevation View</text>

  <!-- ===== CEILING ===== -->
  <rect x="60" y="45" width="480" height="16" fill="#888" rx="2"/>
  <text x="42" y="57" text-anchor="end" font-size="11" fill="#666">Ceiling</text>

  <!-- ===== FLOOR ===== -->
  <rect x="60" y="390" width="480" height="16" fill="#888" rx="2"/>
  <text x="42" y="402" text-anchor="end" font-size="11" fill="#666">Floor</text>

  <!-- ===== WALL (left side) ===== -->
  <rect x="60" y="45" width="35" height="361" fill="#aaa" rx="2"/>

  <!-- ===== WINDOW in wall (glass) ===== -->
  <rect x="60" y="87" width="35" height="258" fill="#add8e6" opacity="0.7"/>
  <!-- Window frame lines -->
  <line x1="60" y1="87" x2="95" y2="87" stroke="#555" stroke-width="3"/>
  <line x1="60" y1="345" x2="95" y2="345" stroke="#555" stroke-width="3"/>

  <!-- ===== HEADRAIL ===== -->
  <rect x="90" y="79" width="28" height="10" fill="#666" rx="2"/>

  <!-- ===== BOTTOM RAIL at 60% position ===== -->
  <!-- Window interior y=89 to y=345 = 256px. 60% = 154px. Bottom rail at y=89+154=243 -->
  <rect x="90" y="241" width="28" height="10" fill="#666" rx="2"/>

  <!-- ===== LADDER STRINGS ===== -->
  <line x1="97" y1="89" x2="97" y2="241" stroke="#888" stroke-width="1.5"/>
  <line x1="110" y1="89" x2="110" y2="241" stroke="#888" stroke-width="1.5"/>

  <!-- ===== SLATS (side cross-section, ~35° tilt) ===== -->
  <!-- Slat area y=89 to y=241 = 152px. 5 slats, spacing=152/5=30.4px -->
  <!-- Centers: y=104, 134, 164, 194, 224 -->
  <!-- Each slat: parallelogram, top-left (92,y-1) to (105,y+8), 3px thick -->
  <!-- Slat 1 -->
  <polygon points="92,103 105,112 105,115 92,106" fill="#c8b090" stroke="#887050" stroke-width="1"/>
  <!-- Slat 2 -->
  <polygon points="92,133 105,142 105,145 92,136" fill="#b8a080" stroke="#887050" stroke-width="1"/>
  <!-- Slat 3 -->
  <polygon points="92,163 105,172 105,175 92,166" fill="#c8b090" stroke="#887050" stroke-width="1"/>
  <!-- Slat 4 -->
  <polygon points="92,193 105,202 105,205 92,196" fill="#b8a080" stroke="#887050" stroke-width="1"/>
  <!-- Slat 5 -->
  <polygon points="92,223 105,232 105,235 92,226" fill="#c8b090" stroke="#887050" stroke-width="1"/>

  <!-- ===== TILT ANGLE INDICATOR on slat 2 (y=134) ===== -->
  <!-- Horizontal reference at y=134 -->
  <line x1="92" y1="134" x2="136" y2="134" stroke="#bbb" stroke-width="1.2" stroke-dasharray="4,3"/>
  <!-- Arc from horizontal (radius=18) to slat direction (~34.7°) -->
  <!-- Start: (92+18,134)=(110,134); End: (92+18*cos35°,134+18*sin35°)=(92+14.7,134+10.3)=(107,144) -->
  <path d="M 110,134 A 18,18 0 0,1 106.7,144.3" fill="none" stroke="#aa2222" stroke-width="1.8"/>
  <!-- Tick at start of arc -->
  <line x1="110" y1="130" x2="110" y2="138" stroke="#aa2222" stroke-width="1.2"/>
  <!-- Label -->
  <text x="140" y="129" font-size="12" fill="#aa2222" font-weight="bold">Tilt</text>
  <text x="140" y="144" font-size="12" fill="#aa2222" font-weight="bold">Angle</text>
  <!-- Leader from label to arc -->
  <line x1="138" y1="135" x2="120" y2="138" stroke="#aa2222" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- ===== OPEN AREA below bottom rail (y=251 to y=345) ===== -->
  <rect x="95" y="251" width="190" height="94" fill="#add8e6" opacity="0.18"/>
  <text x="190" y="301" text-anchor="middle" font-size="11" fill="#225577">Below blind</text>
  <text x="190" y="315" text-anchor="middle" font-size="11" fill="#225577">(uncovered)</text>

  <!-- ===== SUN (outside) ===== -->
  <circle cx="-38" cy="195" r="28" fill="#FFD700" stroke="#cc9900" stroke-width="2"/>
  <line x1="-38" y1="161" x2="-38" y2="153" stroke="#cc9900" stroke-width="2"/>
  <line x1="-38" y1="229" x2="-38" y2="237" stroke="#cc9900" stroke-width="2"/>
  <line x1="-72" y1="195" x2="-80" y2="195" stroke="#cc9900" stroke-width="2"/>
  <line x1="-4" y1="195" x2="4" y2="195" stroke="#cc9900" stroke-width="2"/>
  <line x1="-65" y1="168" x2="-70" y2="163" stroke="#cc9900" stroke-width="2"/>
  <line x1="-11" y1="222" x2="-6" y2="227" stroke="#cc9900" stroke-width="2"/>
  <line x1="-65" y1="222" x2="-70" y2="227" stroke="#cc9900" stroke-width="2"/>
  <line x1="-11" y1="168" x2="-6" y2="163" stroke="#cc9900" stroke-width="2"/>
  <text x="-38" y="200" text-anchor="middle" font-size="18">☀</text>
  <text x="-38" y="241" text-anchor="middle" font-size="11" fill="#664400" font-weight="bold">Outside</text>

  <!-- Sun ray through open area (passes below the blind) -->
  <line x1="-12" y1="208" x2="60" y2="263" stroke="#FFB300" stroke-width="2" stroke-dasharray="10,5"/>
  <line x1="60" y1="263" x2="280" y2="382" stroke="#FFB300" stroke-width="2" stroke-dasharray="10,5"/>
  <polygon points="280,382 268,376 272,387" fill="#FFB300"/>

  <!-- Sun ray blocked/filtered by slats -->
  <line x1="-12" y1="186" x2="60" y2="160" stroke="#FFB300" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <line x1="60" y1="160" x2="92" y2="148" stroke="#FFB300" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.5"/>
  <!-- Blocked symbol -->
  <line x1="95" y1="144" x2="105" y2="154" stroke="#cc4400" stroke-width="2" opacity="0.7"/>
  <line x1="105" y1="144" x2="95" y2="154" stroke="#cc4400" stroke-width="2" opacity="0.7"/>

  <!-- ===== POSITION DIMENSION ===== -->
  <!-- Double-headed arrow at x=160 from y=89 (headrail bottom) to y=241 (bottom rail top) -->
  <line x1="160" y1="89" x2="160" y2="241" stroke="#1a6a1a" stroke-width="1.5"/>
  <polygon points="160,89 155,101 165,101" fill="#1a6a1a"/>
  <polygon points="160,241 155,229 165,229" fill="#1a6a1a"/>
  <line x1="118" y1="89" x2="168" y2="89" stroke="#1a6a1a" stroke-width="1.5"/>
  <line x1="118" y1="241" x2="168" y2="241" stroke="#1a6a1a" stroke-width="1.5"/>
  <!-- Dashed guide lines to rails -->
  <line x1="118" y1="89" x2="95" y2="89" stroke="#1a6a1a" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="118" y1="241" x2="95" y2="241" stroke="#1a6a1a" stroke-width="1" stroke-dasharray="4,3"/>
  <!-- Label -->
  <text x="174" y="157" font-size="13" fill="#1a6a1a" font-weight="bold">Position</text>
  <text x="174" y="173" font-size="13" fill="#1a6a1a" font-weight="bold">= 60%</text>
  <text x="174" y="190" font-size="11" fill="#1a6a1a">(axis 1)</text>

  <!-- ===== WINDOW HEIGHT REFERENCE (100%) ===== -->
  <line x1="230" y1="87" x2="230" y2="345" stroke="#5555cc" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.65"/>
  <polygon points="230,87 225,99 235,99" fill="#5555cc" opacity="0.65"/>
  <polygon points="230,345 225,333 235,333" fill="#5555cc" opacity="0.65"/>
  <line x1="208" y1="87" x2="238" y2="87" stroke="#5555cc" stroke-width="1.5" opacity="0.65"/>
  <line x1="208" y1="345" x2="238" y2="345" stroke="#5555cc" stroke-width="1.5" opacity="0.65"/>
  <!-- Dashed guides to window frame -->
  <line x1="208" y1="87" x2="95" y2="87" stroke="#5555cc" stroke-width="1" stroke-dasharray="3,2" opacity="0.45"/>
  <line x1="208" y1="345" x2="95" y2="345" stroke="#5555cc" stroke-width="1" stroke-dasharray="3,2" opacity="0.45"/>
  <!-- Label -->
  <text x="244" y="205" font-size="12" fill="#5555cc">Window</text>
  <text x="244" y="220" font-size="12" fill="#5555cc">Height</text>
  <text x="244" y="236" font-size="11" fill="#5555cc">(= 100%)</text>

  <!-- ===== LEGEND ===== -->
  <rect x="60" y="418" width="480" height="78" rx="4" fill="#f8f8f8" stroke="#ccc" stroke-width="1"/>
  <!-- Row 1 -->
  <polygon points="75,435 88,444 88,447 75,438" fill="#c8b090" stroke="#887050" stroke-width="1"/>
  <text x="94" y="444" font-size="11" fill="#333">Venetian slat (side cross-section)</text>
  <line x1="290" y1="439" x2="310" y2="439" stroke="#1a6a1a" stroke-width="1.5"/>
  <polygon points="290,439 299,435 299,443" fill="#1a6a1a"/>
  <polygon points="310,439 301,435 301,443" fill="#1a6a1a"/>
  <text x="316" y="444" font-size="11" fill="#333">Position (axis 1: up/down)</text>
  <!-- Row 2 -->
  <!-- Tilt symbol: horizontal line + angled line to show the angle concept -->
  <line x1="75" y1="468" x2="88" y2="468" stroke="#bbb" stroke-width="1.2"/>
  <line x1="75" y1="468" x2="85" y2="459" stroke="#aa2222" stroke-width="1.5"/>
  <path d="M 86,468 A 11,11 0 0,0 82.2,460" fill="none" stroke="#aa2222" stroke-width="1.4"/>
  <text x="94" y="472" font-size="11" fill="#333">Tilt angle (axis 2: slat rotation)</text>
  <line x1="300" y1="464" x2="320" y2="464" stroke="#FFB300" stroke-width="2" stroke-dasharray="6,3"/>
  <polygon points="320,464 310,460 310,468" fill="#FFB300"/>
  <text x="326" y="469" font-size="11" fill="#333">Sun ray</text>
  <!-- Row 3 note -->
  <text x="75" y="489" font-size="10" fill="#888">Both axes are driven independently: position controls vertical travel, tilt controls slat angle.</text>
</svg>
